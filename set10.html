<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>complex layout table</title>
</head>
<body>
 <table border="1" cellpadding="10" width="100%">
     <tr>
    <td colspan="2" style="background:lightgreen;">In</td>
    <td style="background:lightgray;">Entry</td>
    <td style="background:black; color:white;">Parking</td>
  </tr>
   <tr>
    <td style="background:brown; color:white;">Gym</td>
    <td style="background:yellow;">Library Room</td>
    <td rowspan="5" style="background:gold; text-align:center;">Home</td>
    <td style="background:lightblue;">Balcony</td>
  </tr>
  <tr>
    <td style="background:lightgray;">Music Room</td>
    <td style="background:lightblue;">Computer Room</td>
    <td style="background:lime;">Drawing Room</td>
  </tr>
   <tr>
    <td style="background:cyan;">Bedroom</td>
    <td style="background:gray;">Dance Floor</td>
    <td style="background:orange;">Dining Area</td>
  </tr>

  <tr>
    <td style="background:pink;">Master Bedroom</td>
    <td style="background:violet;">Wash Area</td>
    <td style="background:purple; color:white;">Play Room</td>
  </tr>
  <tr>
    <td colspan="2" style="background:white; text-align:center;">Exit</td>
    <td style="background:red; color:white;">Out</td>
  </tr>

 </table>   
</body>
</html>
